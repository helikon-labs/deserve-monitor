app = 'deserve-monitor'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 1881
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
